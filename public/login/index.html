<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h2>Login</h2>
    <form id="login-form">
      <div class="form-group">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password:</label>
        <div class="password-field">
          <input type="password" id="password" name="password" required>
          <span class="toggle-password" onclick="togglePasswordVisibility('password')"><i class="fas fa-eye-slash"></i></span>
        </div>
      </div>
      <button type="submit">Login</button>
    </form>
    <p id="error-message"></p>
    <a href="../index.html" class="back-link">Powrót do strony głównej</a>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js"></script>
  <script>
    function togglePasswordVisibility(inputId) {
        const passwordInput = document.getElementById(inputId);
        const toggleIcon = passwordInput.nextElementSibling;
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            toggleIcon.querySelector('i').classList.remove('fa-eye-slash');
            toggleIcon.querySelector('i').classList.add('fa-eye');
        } else {
            passwordInput.type = "password";
            toggleIcon.querySelector('i').classList.remove('fa-eye');
            toggleIcon.querySelector('i').classList.add('fa-eye-slash');
        }
    }

    async function checkUserExists(username, password) {
      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });
        const result = await response.json();
        if (result.success) {
          localStorage.setItem('token', result.token);
        }
        return result.success;
      } catch (error) {
        console.error('Błąd:', error);
        throw new Error('Błąd logowania');
      }
    }

    document.getElementById('login-form').addEventListener('submit', async function(event) {
      event.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const userExists = await checkUserExists(username, password);
        if (userExists) {
          window.location.href = "../zalogowany/index.html";
        } else {
          document.getElementById('error-message').innerText = "Brak użytkownika";
        }
      } catch (error) {
        document.getElementById('error-message').innerText = error.message;
      }
    });
  </script>
</body>
</html>
